<!DOCTYPE html>
<html>
<head>
<title>Student Result System</title>
<style>
body{
font-family: Arial;
background-color:#f2f2f2;
text-align:center;
}

.container{
background:white;
width:400px;
margin:auto;
padding:20px;
border-radius:10px;
box-shadow:0px 0px 10px gray;
}

input{
padding:8px;
margin:5px;
width:80%;
}

button{
padding:10px;
background-color:green;
color:white;
border:none;
border-radius:5px;
}

table{
margin:auto;
margin-top:20px;
border-collapse:collapse;
}

th,td{
padding:10px;
border:1px solid black;
}
</style>
</head>

<body>

<div class="container">
<h2>Student Result System</h2>

<input type="text" placeholder="Student Name"><br>
<input type="number" placeholder="Math Marks"><br>
<input type="number" placeholder="Science Marks"><br>
<input type="number" placeholder="English Marks"><br>

<button>Calculate Result</button>
</div>

<table>
<tr>
<th>Name</th>
<th>Math</th>
<th>Science</th>
<th>English</th>
<th>Total</th>
</tr>

<tr>
<td>Harshitha</td>
<td>80</td>
<td>75</td>
<td>90</td>
<td>245</td>
</tr>

</table>

</body>
</html>
